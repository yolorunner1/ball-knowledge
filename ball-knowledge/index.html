<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ball Knowledge — Live football scores, fixtures, standings, top scorers and news from every major league worldwide.">
  <meta name="theme-color" content="#0A0A0A">
  <title>Ball Knowledge — Live Scores, Fixtures, Stats & News</title>
  <link rel="icon" href="BK.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime: #AAFF00;
      --lime-dark: #8BCC00;
      --lime-glow: rgba(170, 255, 0, 0.35);
      --gold: #F0A500;
      --gold-soft: rgba(240, 165, 0, 0.15);
      --green: #16A34A;
      --bg: #0A0A0A;
      --bg-deep: #050505;
      --card: rgba(24, 24, 24, 0.7);
      --card-solid: #181818;
      --card-hover: rgba(34, 34, 34, 0.8);
      --red: #EF4444;
      --blue: #38BDF8;
      --orange: #FB923C;
      --text: #ffffff;
      --text-dim: #8B8B8B;
      --text-dimmer: #5C5C5C;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --border-lime: rgba(170, 255, 0, 0.2);
      --glass-bg: rgba(15, 15, 15, 0.55);
      --glass-border: rgba(255, 255, 255, 0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient radial glows behind the UI */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(170, 255, 0, 0.06), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(56, 189, 248, 0.04), transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 120%, rgba(240, 165, 0, 0.03), transparent 60%);
    }
    body > * { position: relative; z-index: 1; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(170, 255, 0, 0.15); border-radius: 5px; border: 2px solid var(--bg-deep); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(170, 255, 0, 0.3); }
    ::selection { background: var(--lime); color: #000; }

    /* ====== HEADER ====== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s;
    }
    .logo:hover { transform: scale(1.02); }
    .logo .lime { color: var(--lime); text-shadow: 0 0 14px var(--lime-glow); }

    .nav { display: flex; gap: 4px; align-items: center; }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.06); }
    .nav-btn.active { background: var(--lime); color: #000; box-shadow: 0 0 20px rgba(170, 255, 0, 0.25); }
    .nav-btn i { width: 16px; height: 16px; }

    .settings-btn {
      padding: 8px;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      display: inline-flex;
      transition: all 0.2s;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.06); transform: rotate(45deg); }

    /* ====== HERO ====== */
    .hero {
      text-align: center;
      padding: 60px 40px 30px;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 140px);
      letter-spacing: 4px;
      line-height: 0.95;
      margin-bottom: 16px;
      animation: heroFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .hero h1 .lime { color: var(--lime); text-shadow: 0 0 40px var(--lime-glow); }
    .hero .tagline {
      color: var(--text-dim);
      font-size: 16px;
      font-weight: 500;
      animation: heroFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ====== HOLOGRAPHIC LIVE PILL ====== */
    .live-pill-row {
      display: flex;
      justify-content: center;
      padding: 28px 40px 0;
    }

    .holo-live-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      color: #fff;
      background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(239,68,68,0.4),
        0 0 12px rgba(239,68,68,0.2),
        0 0 30px rgba(239,68,68,0.08),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      animation: holo-pulse 3s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    .holo-live-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 60%, transparent 70%);
      background-size: 200% 100%;
      animation: holo-sheen 3s linear infinite;
      border-radius: inherit;
    }
    .holo-live-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: conic-gradient(from 0deg, rgba(239,68,68,0.6), rgba(251,146,60,0.4), rgba(239,68,68,0.1), rgba(239,68,68,0.6));
      opacity: 0;
      animation: holo-border 3s linear infinite;
      z-index: -1;
    }
    .holo-live-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 0 1px rgba(239,68,68,0.7), 0 0 20px rgba(239,68,68,0.4), 0 0 50px rgba(239,68,68,0.15), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .holo-live-btn:hover::after { opacity: 1; }

    .holo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #EF4444;
      flex-shrink: 0;
      box-shadow: 0 0 6px #EF4444, 0 0 12px rgba(239,68,68,0.6);
      animation: holo-dot-pulse 1.2s ease-in-out infinite;
    }
    .holo-text {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, #fff 0%, rgba(239,68,68,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .holo-count {
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      color: #EF4444;
      font-weight: 700;
      letter-spacing: 0;
    }
    .holo-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.25); }
    .holo-countries {
      position: relative; z-index: 1;
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
    }

    @keyframes holo-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(239,68,68,0.4), 0 0 12px rgba(239,68,68,0.2), 0 0 30px rgba(239,68,68,0.08), inset 0 1px 0 rgba(255,255,255,0.08); }
      50%      { box-shadow: 0 0 0 1px rgba(239,68,68,0.6), 0 0 20px rgba(239,68,68,0.35), 0 0 50px rgba(239,68,68,0.12), inset 0 1px 0 rgba(255,255,255,0.1); }
    }
    @keyframes holo-dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }
    @keyframes holo-sheen {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes holo-border {
      0%   { transform: rotate(0deg); opacity: 0.6; }
      100% { transform: rotate(360deg); opacity: 0.6; }
    }

    /* ====== PAGES & CONTAINER ====== */
    .page { display: none; animation: pageFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .page.active { display: block; }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 40px 80px;
    }

    /* ====== GLASS SECTION CARDS ====== */
    .section {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title .gold-accent {
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ====== DATE SWITCHER ====== */
    .date-switcher { display: flex; gap: 6px; flex-wrap: wrap; }

    .date-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .date-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border-hover); transform: translateY(-1px); }
    .date-btn.active { background: var(--lime); border-color: var(--lime); color: #000; box-shadow: 0 0 14px rgba(170,255,0,0.3); }

    /* ====== LEAGUE BLOCK ====== */
    .league-block { border-top: 1px solid var(--border); }
    .league-block:first-child { border-top: none; }

    .league-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .league-header:hover { background: rgba(255,255,255,0.03); }

    .league-logo { width: 22px; height: 22px; flex-shrink: 0; object-fit: contain; }
    .league-name { font-weight: 700; font-size: 14px; }
    .league-country { color: var(--text-dim); font-size: 12px; font-weight: 500; }

    .league-chevron {
      margin-left: auto;
      color: var(--text-dim);
      transition: transform 0.2s;
      display: inline-flex;
    }
    .league-chevron i { width: 18px; height: 18px; }
    .league-block.collapsed .league-chevron { transform: rotate(-90deg); }
    .league-block.collapsed .league-fixtures { display: none; }

    /* ====== FIXTURE ROW ====== */
    .fixture {
      display: grid;
      grid-template-columns: 80px 1fr 110px 1fr 80px;
      align-items: center;
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      gap: 12px;
      position: relative;
    }
    .fixture::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--lime);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fixture:hover { background: rgba(170, 255, 0, 0.04); }
    .fixture:hover::before { opacity: 1; }

    .fixture-time {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .fixture-time.live { color: var(--red); }

    .fixture-home {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      font-weight: 600; font-size: 14px; min-width: 0;
    }
    .fixture-home .team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .fixture-away {
      display: flex; align-items: center; justify-content: flex-start; gap: 10px;
      font-weight: 600; font-size: 14px; min-width: 0;
    }
    .fixture-away .team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .team-logo { width: 22px; height: 22px; flex-shrink: 0; object-fit: contain; }

    .fixture-score {
      display: flex; justify-content: center; align-items: center;
      font-weight: 800; font-size: 15px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      min-width: 80px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .fixture-score.live {
      color: var(--red);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.15);
    }
    .fixture-score.upcoming { color: var(--text-dim); font-weight: 700; font-size: 13px; }

    .fixture-btts {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 6px;
      border-radius: 4px;
      background: rgba(170, 255, 0, 0.12);
      color: var(--lime);
      border: 1px solid rgba(170, 255, 0, 0.2);
      text-align: center;
      white-space: nowrap;
    }
    .fixture-extra {
      display: flex; justify-content: flex-end; align-items: center; gap: 4px;
    }

    /* ====== MODAL ====== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 200;
      padding: 40px 20px;
      overflow-y: auto;
      animation: modalOverlayIn 0.25s ease;
    }
    .modal-overlay.active { display: flex; }
    @keyframes modalOverlayIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--card-solid);
      border-radius: 18px;
      width: 100%;
      max-width: 720px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 80px);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 15px;
      flex-shrink: 0;
    }

    .modal-close {
      background: transparent; border: none; color: var(--text);
      cursor: pointer; padding: 4px;
      display: inline-flex; border-radius: 6px;
      transition: all 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }

    .modal-tabs {
      display: flex; gap: 4px;
      padding: 0 24px;
      background: var(--card-solid);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .modal-tab {
      padding: 14px 16px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .modal-tab:hover { color: var(--text); }
    .modal-tab.active { color: var(--lime); border-bottom-color: var(--lime); }

    .modal-body { overflow-y: auto; flex: 1; padding: 20px 24px 24px; }

    /* MATCH HEADER (inside modal) */
    .match-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 8px 0 20px;
      gap: 20px;
    }
    .match-team { text-align: center; }
    .match-team img { width: 56px; height: 56px; margin-bottom: 8px; object-fit: contain; }
    .match-team .name { font-weight: 700; font-size: 15px; }

    .match-score-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .match-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 54px;
      letter-spacing: 4px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .match-status {
      font-size: 12px; font-weight: 700; color: var(--text-dim);
      letter-spacing: 1px;
    }
    .match-status.live {
      color: var(--red);
      display: flex; align-items: center; gap: 6px;
    }
    .match-status.live::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--red); border-radius: 50%;
      animation: holo-dot-pulse 1.2s infinite;
    }
    .match-venue {
      text-align: center; color: var(--text-dim); font-size: 12px;
      margin-bottom: 18px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    /* ====== EVENTS TAB ====== */
    .event-row {
      display: grid;
      grid-template-columns: 46px 1fr 32px 1fr;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
    .event-row:first-of-type { border-top: none; }
    .event-time { color: var(--text-dim); font-size: 12px; font-weight: 700; }
    .event-home, .event-away { font-size: 13px; }
    .event-home { text-align: right; }
    .event-away { text-align: left; }
    .event-center-icon { display: flex; justify-content: center; color: var(--text-dim); }
    .event-center-icon i { width: 18px; height: 18px; }
    .event-center-icon.goal   { color: var(--lime); }
    .event-center-icon.yellow { color: #FCD34D; }
    .event-center-icon.red    { color: var(--red); }
    .event-center-icon.sub    { color: var(--blue); }
    .event-player { font-weight: 700; }
    .event-detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ====== STATS TAB — centre-out bars ====== */
    .stat-row { margin-bottom: 20px; }
    .stat-top {
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .stat-value { font-weight: 800; font-size: 22px; font-variant-numeric: tabular-nums; }
    .stat-value.home { text-align: right; color: var(--lime); }
    .stat-value.away { text-align: left;  color: var(--blue); }

    .stat-label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .stat-bar-wrap {
      display: grid;
      grid-template-columns: 1fr 3px 1fr;
      height: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 5px;
      overflow: hidden;
    }
    .stat-bar-home { display: flex; justify-content: flex-end; }
    .stat-bar-home-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--lime-dark), var(--lime));
      border-radius: 5px 0 0 5px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(170, 255, 0, 0.4);
    }
    .stat-bar-center { background: rgba(255,255,255,0.25); }
    .stat-bar-away { display: flex; justify-content: flex-start; }
    .stat-bar-away-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), #0EA5E9);
      border-radius: 0 5px 5px 0;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    }

    /* ====== LINEUPS TAB ====== */
    .lineups-wrap { display: flex; flex-direction: column; gap: 16px; }

    .formations-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
      padding: 6px 0 14px;
    }
    .formation-label {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 13px;
    }
    .formation-label.away { justify-content: flex-end; }
    .formation-badge {
      background: rgba(255,255,255,0.08);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 700;
    }
    .formation-label.home .formation-badge { color: var(--lime); background: rgba(170,255,0,0.1); }
    .formation-label.away .formation-badge { color: var(--blue); background: rgba(56,189,248,0.1); }

    .pitch-container {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      aspect-ratio: 400 / 700;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    }
    .pitch-svg { width: 100%; height: 100%; display: block; }

    .player-number {
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      font-size: 11px;
      fill: #000;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .player-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 9px;
      fill: #fff;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.85);
      stroke-width: 2.5;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .subs-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
    .subs-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px; letter-spacing: 2px;
      margin-bottom: 12px;
      color: var(--text-dim);
    }
    .subs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .subs-team-title { font-size: 12px; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }
    .subs-team-title.home { color: var(--lime); }
    .subs-team-title.away { color: var(--blue); }
    .sub-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .sub-number { font-weight: 800; min-width: 22px; color: var(--text-dim); }

    /* ====== BACK TO TOP ====== */
    .back-to-top {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--lime); color: #000;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(170, 255, 0, 0.3);
      opacity: 0; visibility: hidden; transform: translateY(20px);
      transition: all 0.3s;
      z-index: 150;
    }
    .back-to-top.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    .back-to-top:hover {
      background: #BFFF40; transform: translateY(-4px);
      box-shadow: 0 6px 24px rgba(170, 255, 0, 0.5);
    }
    .back-to-top i { width: 20px; height: 20px; }

    /* ====== SEARCH ====== */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px 11px 42px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none; border-color: var(--lime);
      background: rgba(170,255,0,0.04);
      box-shadow: 0 0 0 3px rgba(170,255,0,0.1);
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); display: inline-flex;
    }
    .search-icon i { width: 16px; height: 16px; }

    /* ====== STANDINGS TABLE ====== */
    .standings-view-tabs {
      display: flex; gap: 6px;
      padding: 14px 22px 0;
    }
    .standings-view-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
    }
    .standings-view-tab:hover { border-color: var(--border-hover); }
    .standings-view-tab.active { background: var(--gold); border-color: var(--gold); color: #000; box-shadow: 0 0 12px rgba(240,165,0,0.25); }

    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      text-align: left;
      padding: 12px 22px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .standings-table th.c { text-align: center; }
    .standings-table td {
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      transition: all 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .standings-table tr { transition: all 0.15s; position: relative; }
    .standings-table tbody tr:hover td { background: rgba(170, 255, 0, 0.03); }
    .standings-table td.c { text-align: center; }
    .standings-table .pos {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      position: relative;
    }
    .standings-table tr.zone-ucl .pos::before {
      content: ''; position: absolute;
      left: 8px; top: 50%; transform: translateY(-50%);
      width: 4px; height: 70%; border-radius: 2px;
      background: #38BDF8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
    }
    .standings-table tr.zone-uel .pos::before {
      content: ''; position: absolute;
      left: 8px; top: 50%; transform: translateY(-50%);
      width: 4px; height: 70%; border-radius: 2px;
      background: var(--orange); box-shadow: 0 0 8px rgba(251, 146, 60, 0.5);
    }
    .standings-table tr.zone-uecl .pos::before {
      content: ''; position: absolute;
      left: 8px; top: 50%; transform: translateY(-50%);
      width: 4px; height: 70%; border-radius: 2px;
      background: var(--green); box-shadow: 0 0 8px rgba(22, 163, 74, 0.5);
    }
    .standings-table tr.zone-rel .pos::before {
      content: ''; position: absolute;
      left: 8px; top: 50%; transform: translateY(-50%);
      width: 4px; height: 70%; border-radius: 2px;
      background: var(--red); box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    .standings-table .team-cell { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .standings-table .pts { font-weight: 800; color: var(--lime); font-size: 15px; }

    /* GD visual bar */
    .gd-cell { position: relative; min-width: 70px; }
    .gd-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .gd-value.pos { color: var(--lime); }
    .gd-value.neg { color: var(--red); }
    .gd-bar-wrap {
      display: grid;
      grid-template-columns: 1fr 2px 1fr;
      height: 4px;
      margin-top: 4px;
      max-width: 80px;
      margin-left: auto;
      margin-right: auto;
    }
    .gd-bar-left { display: flex; justify-content: flex-end; }
    .gd-bar-right { display: flex; justify-content: flex-start; }
    .gd-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--lime-dark), var(--lime));
      border-radius: 2px;
    }
    .gd-bar-fill.neg { background: linear-gradient(90deg, var(--red), #DC2626); }
    .gd-bar-center { background: rgba(255,255,255,0.2); }

    /* Form dots */
    .form-cell { display: flex; gap: 3px; justify-content: center; }
    .form-dot {
      width: 16px; height: 16px;
      border-radius: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #000;
      position: relative;
    }
    .form-dot.W { background: var(--lime); }
    .form-dot.D { background: #FCD34D; }
    .form-dot.L { background: var(--red); color: #fff; }
    .form-dot.recent::after {
      content: ''; position: absolute;
      inset: -2px; border-radius: 5px;
      border: 1px solid var(--lime);
      animation: pulse-recent 1.4s ease-in-out infinite;
    }
    @keyframes pulse-recent {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.08); }
    }

    .zone-legend {
      display: flex; flex-wrap: wrap; gap: 14px;
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
    }
    .zone-legend-item { display: flex; align-items: center; gap: 6px; }
    .zone-legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .zone-legend-dot.ucl { background: #38BDF8; }
    .zone-legend-dot.uel { background: var(--orange); }
    .zone-legend-dot.uecl { background: var(--green); }
    .zone-legend-dot.rel { background: var(--red); }

    /* ====== NEWS ====== */
    .news-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .news-filter {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .news-filter:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .news-filter.active { background: var(--lime); border-color: var(--lime); color: #000; box-shadow: 0 0 14px rgba(170,255,0,0.25); }
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .news-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      color: var(--text);
      animation: cardStaggerIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
    }
    .news-card:hover {
      border-color: var(--border-lime);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(170,255,0,0.1);
    }
    .news-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #222;
    }
    .news-content { padding: 14px; }
    .news-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-meta {
      display: flex; justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }
    @keyframes cardStaggerIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ====== STATS / SCORERS ====== */
    .stats-tabs {
      display: flex; gap: 6px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .stat-league-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .stat-league-btn:hover { border-color: var(--border-hover); }
    .stat-league-btn.active { background: var(--lime); border-color: var(--lime); color: #000; box-shadow: 0 0 14px rgba(170,255,0,0.25); }

    /* ====== FUT-STYLE SCORER CARDS ====== */
    .scorers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px 22px;
    }

    .fut-card {
      position: relative;
      background: linear-gradient(145deg, #1a1a1a 0%, #0e0e0e 100%);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: default;
      animation: cardStaggerIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .fut-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
      border-color: var(--border-hover);
    }

    /* Gold holographic card for #1 */
    .fut-card.rank-1 {
      background:
        linear-gradient(145deg, rgba(240, 165, 0, 0.1), rgba(170, 255, 0, 0.04) 50%, rgba(10, 10, 10, 0.9)),
        linear-gradient(145deg, #1f1a05 0%, #0e0e0e 100%);
      border: 1px solid rgba(240, 165, 0, 0.4);
      box-shadow: 0 8px 28px rgba(240, 165, 0, 0.2);
    }
    .fut-card.rank-1::before {
      content: '';
      position: absolute;
      inset: 0;
      background: conic-gradient(from 0deg, transparent, rgba(240, 165, 0, 0.12), transparent 30%, transparent 70%, rgba(170, 255, 0, 0.08), transparent);
      animation: fut-rotate 6s linear infinite;
      pointer-events: none;
    }
    .fut-card.rank-1::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255, 215, 64, 0.08) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: fut-sheen 4s linear infinite;
      pointer-events: none;
    }
    @keyframes fut-rotate { to { transform: rotate(360deg); } }
    @keyframes fut-sheen {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .fut-card.rank-2 {
      border: 1px solid rgba(180, 180, 180, 0.2);
      background: linear-gradient(145deg, #1a1a1c 0%, #0e0e0e 100%);
    }
    .fut-card.rank-3 {
      border: 1px solid rgba(205, 127, 50, 0.2);
      background: linear-gradient(145deg, #1a1612 0%, #0e0e0e 100%);
    }

    .fut-top {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .fut-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      line-height: 1;
      color: var(--text);
      text-align: center;
      letter-spacing: 1px;
    }
    .fut-card.rank-1 .fut-rank { color: var(--gold); text-shadow: 0 0 16px rgba(240, 165, 0, 0.5); }
    .fut-card.rank-2 .fut-rank { color: #D1D5DB; }
    .fut-card.rank-3 .fut-rank { color: #CD7F32; }

    .fut-player-name {
      font-weight: 800;
      font-size: 16px;
      line-height: 1.2;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .fut-player-team {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
    }
    .fut-player-team img { width: 14px; height: 14px; object-fit: contain; }

    .fut-radar {
      display: flex; justify-content: center;
      position: relative;
      z-index: 1;
      margin: 6px 0 12px;
    }
    .fut-radar svg { width: 100%; max-width: 200px; height: auto; }

    .fut-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .fut-stat {
      text-align: center;
      padding: 8px 4px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .fut-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      line-height: 1;
      color: var(--lime);
      font-variant-numeric: tabular-nums;
    }
    .fut-card.rank-1 .fut-stat-value { color: var(--gold); }
    .fut-stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 700;
      margin-top: 4px;
    }

    .fut-badge {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 7px;
      border-radius: 4px;
      background: rgba(170, 255, 0, 0.15);
      color: var(--lime);
      border: 1px solid rgba(170, 255, 0, 0.3);
      text-transform: uppercase;
      z-index: 2;
    }

    /* Compact scorer row (for player search results) */
    .scorer-row {
      display: grid;
      grid-template-columns: 40px 1fr 60px 60px;
      align-items: center;
      gap: 12px;
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      transition: all 0.15s;
    }
    .scorer-row:first-child { border-top: none; }
    .scorer-row:hover { background: rgba(170, 255, 0, 0.03); }
    .scorer-head {
      background: rgba(255,255,255,0.02);
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .scorer-pos { font-weight: 800; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .scorer-name { font-weight: 700; }
    .scorer-team { display: flex; gap: 8px; align-items: center; color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .scorer-value { text-align: center; font-weight: 800; font-variant-numeric: tabular-nums; }
    .scorer-value.goals { color: var(--lime); }

    /* ====== SKELETON SHIMMER ====== */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-fixture {
      display: grid;
      grid-template-columns: 80px 1fr 110px 1fr 80px;
      align-items: center;
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }
    .skeleton-box { height: 16px; border-radius: 4px; }

    /* ====== LOADING / EMPTY ====== */
    .loading, .empty {
      text-align: center;
      padding: 40px 22px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--lime);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ====== TOOLTIP ====== */
    .tooltip { position: relative; display: inline-flex; align-items: center; }
    .tooltip[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-transform: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      border: 1px solid var(--border);
      z-index: 50;
    }
    .tooltip[data-tip]:hover::after { opacity: 1; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 768px) {
      .header { padding: 14px 16px; }
      .logo { font-size: 22px; }
      .nav { gap: 2px; }
      .nav-btn { padding: 6px 10px; font-size: 12px; }
      .nav-btn span { display: none; }
      .hero { padding: 40px 20px 20px; }
      .container { padding: 16px 14px 60px; }
      .fixture {
        grid-template-columns: 50px 1fr 80px 1fr 50px;
        padding: 10px 14px;
        gap: 8px;
      }
      .fixture-home, .fixture-away { font-size: 13px; }
      .team-logo { width: 20px; height: 20px; }
      .section-header { padding: 14px 16px; }
      .league-header { padding: 12px 14px; }
      .modal-body { padding: 16px; }
      .match-score { font-size: 42px; }
      .subs-grid { grid-template-columns: 1fr; }
      .event-row { grid-template-columns: 36px 1fr 28px 1fr; }
      .standings-table th, .standings-table td { padding: 10px 12px; font-size: 13px; }
      .standings-table .form-col, .standings-table .gd-col { display: none; }
      .scorers-grid { grid-template-columns: 1fr; padding: 14px; gap: 12px; }
      .fut-card { padding: 14px; }
      .fut-rank { font-size: 36px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo" onclick="navigate('home')">BALL <span class="lime">KNOWLEDGE</span></div>
    <nav class="nav">
      <button class="nav-btn active" data-page="home" onclick="navigate('home')"><i data-lucide="home"></i><span>Home</span></button>
      <button class="nav-btn" data-page="fixtures" onclick="navigate('fixtures')"><i data-lucide="calendar"></i><span>Fixtures</span></button>
      <button class="nav-btn" data-page="standings" onclick="navigate('standings')"><i data-lucide="list-ordered"></i><span>Standings</span></button>
      <button class="nav-btn" data-page="stats" onclick="navigate('stats')"><i data-lucide="bar-chart-3"></i><span>Stats</span></button>
      <button class="nav-btn" data-page="news" onclick="navigate('news')"><i data-lucide="newspaper"></i><span>News</span></button>

          <div class="skeleton-fixture"><div class="skeleton skeleton-box" style="width:40px"></div><div class="skeleton skeleton-box"></div><div class="skeleton skeleton-box"></div><div class="skeleton skeleton-box"></div><div></div></div>
          <div class="skeleton-fixture"><div class="skeleton skeleton-box" style="width:40px"></div><div class="skeleton skeleton-box"></div><div class="skeleton skeleton-box"></div><div class="skeleton skeleton-box"></div><div></div></div>

        <button class="modal-tab"        data-tab="lineups" onclick="setModalTab('lineups')">Lineups</button>
        <button class="modal-tab"        data-tab="stats"   onclick="setModalTab('stats')">Stats</button>

  <!-- BACK TO TOP -->
  <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="Back to top">
    <i data-lucide="arrow-up"></i>
  </button>

  <script>
    /* ============ CONFIG ============ */
    const TOP_LEAGUES = [
      { id: 2,   name: 'Champions League',  abbr: ['ucl','cl','champions'] },
      { id: 39,  name: 'Premier League',    abbr: ['epl','pl','prem','bpl'] },
      { id: 3,   name: 'Europa League',     abbr: ['uel','el','europa'] },
      { id: 140, name: 'La Liga',           abbr: ['laliga','ll','liga'] },
      { id: 78,  name: 'Bundesliga',        abbr: ['bl','buli','bund'] },
      { id: 135, name: 'Serie A',           abbr: ['sa','seriea','calcio'] },
      { id: 61,  name: 'Ligue 1',           abbr: ['l1','ligue1','ligue'] },
      { id: 1,   name: 'World Cup',         abbr: ['wc','worldcup','fifa'] },
      { id: 4,   name: 'Euro Championship', abbr: ['euros','euro'] },
      { id: 6,   name: 'Nations League',    abbr: ['nl','nations','unl'] },
      { id: 9,   name: 'Copa America',      abbr: ['copa','ca'] },
      { id: 848, name: 'Conference League', abbr: ['uecl','conf'] },
      { id: 45,  name: 'FA Cup',            abbr: ['fa','facup'] },
      { id: 48,  name: 'Carabao Cup',       abbr: ['carabao','efl'] },
      { id: 88,  name: 'Eredivisie',        abbr: ['ere','eredivisie'] },
      { id: 94,  name: 'Primeira Liga',     abbr: ['por','primeira'] },
      { id: 307, name: 'Saudi Pro League',  abbr: ['spl','saudi'] },
      { id: 253, name: 'MLS',               abbr: ['mls','usa'] }
    ];
    const TOP_IDS = new Set(TOP_LEAGUES.map(l => l.id));
    const SEASON = 2025;

    /* ============ STATE ============ */
    let homeDateOffset = 0;
    let fixturesDateOffset = 0;
    let allFixturesCache = [];
    let modalFixtureData = null;
    let currentModalTab = 'events';
    let newsFilter = 'all';
    let currentStandingsLeague = 39;
    let currentStandingsView = 'overall';
    let currentScorersLeague = 39;
    let standingsCache = null;

    /* ============ UTILS ============ */
    const dateWithOffset = (offset) => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    };
    const fmtTime = (iso) => new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
    const isLiveStatus = (s) => ['1H','2H','HT','ET','P','LIVE','BT'].includes(s);
    const isFinishedStatus = (s) => ['FT','AET','PEN'].includes(s);
    const refreshIcons = () => { if (window.lucide) window.lucide.createIcons(); };

    // countUp animator
    function countUp(el, target, duration = 800) {
      if (!el || isNaN(target)) return;
      const start = performance.now();
      const from = 0;
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (target - from) * eased);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    /* ============ NAV ============ */
    function navigate(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (page === 'home') loadHome();
      if (page === 'fixtures') loadAllFixtures();
      if (page === 'standings') loadStandings();
      if (page === 'stats') loadScorers();
      if (page === 'news') loadNews();
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    window.addEventListener('scroll', () => {
      document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 400);
    });

    /* ============ FIXTURE RENDER ============ */
    function fixtureHTML(f) {
      const status = f.fixture.status.short;
      const live = isLiveStatus(status);
      const finished = isFinishedStatus(status);
      let timeCell = fmtTime(f.fixture.date);
      let scoreClass = 'upcoming';
      let scoreText = fmtTime(f.fixture.date);
      let bttsBadge = '';

      if (live) {
        timeCell = `${f.fixture.status.elapsed || ''}'`;
        scoreClass = 'live';
        scoreText = `${f.goals.home ?? 0} - ${f.goals.away ?? 0}`;
      } else if (finished) {
        timeCell = 'FT';
        scoreClass = '';
        scoreText = `${f.goals.home ?? 0} - ${f.goals.away ?? 0}`;
        // BTTS retrospective tag
        if ((f.goals.home ?? 0) > 0 && (f.goals.away ?? 0) > 0) {
          bttsBadge = '<span class="fixture-btts tooltip" data-tip="Both Teams To Score">BTTS</span>';
        }
      } else {
        scoreText = 'vs';
      }
      return `
        <div class="fixture" onclick="openMatch(${f.fixture.id})">
          <div class="fixture-time ${live ? 'live' : ''}">${timeCell}</div>
          <div class="fixture-home">
            <span class="team-name">${f.teams.home.name}</span>
            <img class="team-logo" src="${f.teams.home.logo}" alt="" onerror="this.style.display='none'">
          </div>
          <div class="fixture-score ${scoreClass}">${scoreText}</div>
          <div class="fixture-away">
            <img class="team-logo" src="${f.teams.away.logo}" alt="" onerror="this.style.display='none'">
            <span class="team-name">${f.teams.away.name}</span>
          </div>
          <div class="fixture-extra">${bttsBadge}</div>
        </div>
      `;
    }

    function groupByLeague(fixtures) {
      const groups = new Map();
      fixtures.forEach(f => {
        const id = f.league.id;
        if (!groups.has(id)) groups.set(id, { id, name: f.league.name, country: f.league.country, logo: f.league.logo, fixtures: [] });
        groups.get(id).fixtures.push(f);
      });
      const arr = Array.from(groups.values());
      arr.sort((a, b) => {
        const aTop = TOP_LEAGUES.findIndex(l => l.id === a.id);
        const bTop = TOP_LEAGUES.findIndex(l => l.id === b.id);
        if (aTop !== -1 && bTop !== -1) return aTop - bTop;
        if (aTop !== -1) return -1;
        if (bTop !== -1) return 1;
        return a.name.localeCompare(b.name);
      });
      return arr;
    }

    function renderLeagueGroups(groups, containerId) {
      const container = document.getElementById(containerId);
      if (!groups.length) { container.innerHTML = '<div class="empty">No fixtures to show.</div>'; return; }
      container.innerHTML = groups.map((g, i) => {
        const isTop = TOP_IDS.has(g.id);
        const collapsed = !isTop && i > 3 ? 'collapsed' : '';
        return `
          <div class="league-block ${collapsed}">
            <div class="league-header" onclick="this.parentElement.classList.toggle('collapsed')">
              <img class="league-logo" src="${g.logo}" alt="" onerror="this.style.display='none'">
              <span class="league-name">${g.name}</span>
              <span class="league-country">${g.country === 'World' ? 'UEFA & International' : g.country}</span>
              <span class="league-chevron"><i data-lucide="chevron-down"></i></span>
            </div>
            <div class="league-fixtures">
              ${g.fixtures.map(fixtureHTML).join('')}
            </div>
          </div>
        `;
      }).join('');
      refreshIcons();
    }

    /* ============ HOME ============ */
    function setHomeDate(offset) {
      homeDateOffset = offset;
      document.querySelectorAll('#page-home .date-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.dateOffset) === offset));
      loadHome();
    }

    async function loadHome() {
      const date = dateWithOffset(homeDateOffset);
      const c = document.getElementById('homeFixtures');
      c.innerHTML = Array(4).fill(0).map(() => `
        <div class="skeleton-fixture">
          <div class="skeleton skeleton-box" style="width:40px"></div>
          <div class="skeleton skeleton-box"></div>
          <div class="skeleton skeleton-box"></div>
          <div class="skeleton skeleton-box"></div>
          <div></div>
        </div>`).join('');
      try {
        const res = await fetch(`/api/fixtures?date=${date}&season=${SEASON}`);
        const data = await res.json();
        const all = data.response || [];
        const top = all.filter(f => TOP_IDS.has(f.league.id));
        renderLeagueGroups(groupByLeague(top), 'homeFixtures');
        const live = all.filter(f => isLiveStatus(f.fixture.status.short));
        countUp(document.getElementById('liveCount'), live.length);
        const countries = new Set(all.map(f => f.league.country));
        document.getElementById('countryCount').textContent = `${countries.size} COUNTRIES`;
      } catch (e) {
        c.innerHTML = '<div class="empty">Could not load fixtures.</div>';
      }
    }

    /* ============ ALL FIXTURES ============ */
    function setFixturesDate(offset) {
      fixturesDateOffset = offset;
      document.querySelectorAll('#page-fixtures .date-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.dateOffset) === offset));
      loadAllFixtures();
    }

    async function loadAllFixtures() {
      const date = dateWithOffset(fixturesDateOffset);
      const c = document.getElementById('allFixtures');
      c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const res = await fetch(`/api/fixtures?date=${date}&season=${SEASON}`);
        const data = await res.json();
        allFixturesCache = data.response || [];
        renderFixturesFiltered();
      } catch (e) {
        c.innerHTML = '<div class="empty">Could not load fixtures.</div>';
      }
    }

    function renderFixturesFiltered() {
      const q = (document.getElementById('fixturesSearch').value || '').trim().toLowerCase();
      let filtered = allFixturesCache;
      if (q) {
        filtered = filtered.filter(f => {
          const n = f.league.name.toLowerCase();
          const c = (f.league.country || '').toLowerCase();
          const matchAbbr = TOP_LEAGUES.find(l => l.id === f.league.id)?.abbr.some(a => a.toLowerCase() === q);
          return n.includes(q) || c.includes(q) || matchAbbr;
        });
      }
      renderLeagueGroups(groupByLeague(filtered), 'allFixtures');
    }

    document.addEventListener('input', (e) => {
      if (e.target.id === 'fixturesSearch') renderFixturesFiltered();
      if (e.target.id === 'standingsSearch') onStandingsSearch();
    });

    /* ============ STANDINGS ============ */
    function buildStandingsTabs() {
      document.getElementById('standingsTabs').innerHTML = TOP_LEAGUES.slice(0, 8).map(l =>
        `<button class="stat-league-btn ${l.id === currentStandingsLeague ? 'active' : ''}" onclick="setStandingsLeague(${l.id})">${l.name}</button>`
      ).join('');
    }
    function setStandingsLeague(id) { currentStandingsLeague = id; standingsCache = null; buildStandingsTabs(); loadStandings(); }
    function setStandingsView(view) {
      currentStandingsView = view;
      document.querySelectorAll('.standings-view-tab').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      if (standingsCache) renderStandings(standingsCache);
    }

    // Map standings description to zone class (UCL / UEL / UECL / Rel)
    function getZoneClass(description = '') {
      const d = description.toLowerCase();
      if (d.includes('champions league')) return 'zone-ucl';
      if (d.includes('europa league'))    return 'zone-uel';
      if (d.includes('conference'))       return 'zone-uecl';
      if (d.includes('relegation'))       return 'zone-rel';
      return '';
    }

    function onStandingsSearch() {
      const q = (document.getElementById('standingsSearch').value || '').trim().toLowerCase();
      if (!q) return;
      const match = TOP_LEAGUES.find(l => {
        const nameMatch = l.name.toLowerCase().includes(q);
        const abbrMatch = l.abbr.some(a => a.toLowerCase() === q);
        return nameMatch || abbrMatch;
      });
      if (match && match.id !== currentStandingsLeague) {
        setStandingsLeague(match.id);
      }
    }

    async function loadStandings() {
      buildStandingsTabs();
      const c = document.getElementById('standingsContent');
      c.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const res = await fetch(`/api/standings?league=${currentStandingsLeague}&season=${SEASON}`);
        const data = await res.json();
        const groups = data.response?.[0]?.league?.standings || [];
        const table = groups[0] || [];
        if (!table.length) { c.innerHTML = '<div class="empty">No standings available.</div>'; return; }
        standingsCache = table;
        renderStandings(table);
      } catch (e) {
        c.innerHTML = '<div class="empty">Could not load standings.</div>';
      }
    }

    function renderStandings(table) {
      const c = document.getElementById('standingsContent');
      const view = currentStandingsView;

      // For Form view, sort by last-5 points
      let rows = [...table];
      if (view === 'form') {
        rows = rows.map(t => {
          const form = (t.form || '').slice(-5);
          let pts = 0;
          for (const ch of form) {
            if (ch === 'W') pts += 3;
            else if (ch === 'D') pts += 1;
          }
          return { ...t, _formPts: pts, _formStr: form };
        });
        rows.sort((a, b) => b._formPts - a._formPts);
      }

      // Calculate max GD for bar scaling
      const maxGD = Math.max(1, ...rows.map(t => Math.abs(t.goalsDiff ?? 0)));

      const headerHTML = view === 'form'
        ? `<tr><th>#</th><th>Team</th><th class="c">Form</th><th class="c">Pts(L5)</th></tr>`
        : `<tr><th>#</th><th>Team</th><th class="c">P</th><th class="c">W</th><th class="c">D</th><th class="c">L</th><th class="c form-col">Form</th><th class="c gd-col">GD</th><th class="c">Pts</th></tr>`;

      const bodyHTML = rows.map((t, i) => {
        const rank = view === 'form' ? (i + 1) : t.rank;
        const zone = view === 'form' ? '' : getZoneClass(t.description);
        const stats = view === 'home' ? t.home : (view === 'away' ? t.away : t.all);
        const form = (t.form || '').slice(-5);

        if (view === 'form') {
          const formDots = form.split('').map((ch, idx) => {
            const recent = idx === form.length - 1 ? 'recent' : '';
            return `<span class="form-dot ${ch} ${recent}">${ch}</span>`;
          }).join('');
          return `
            <tr>
              <td class="pos">${rank}</td>
              <td><div class="team-cell"><img class="team-logo" src="${t.team.logo}" alt="" onerror="this.style.display='none'">${t.team.name}</div></td>
              <td class="c"><div class="form-cell">${formDots || '—'}</div></td>
              <td class="c pts">${t._formPts}</td>
            </tr>`;
        }

        const gd = t.goalsDiff ?? 0;
        const gdPct = Math.min(100, Math.abs(gd) / maxGD * 100);
        const gdBarHTML = `
          <div class="gd-bar-wrap">
            <div class="gd-bar-left">${gd < 0 ? `<div class="gd-bar-fill neg" style="width:${gdPct}%"></div>` : ''}</div>
            <div class="gd-bar-center"></div>
            <div class="gd-bar-right">${gd > 0 ? `<div class="gd-bar-fill" style="width:${gdPct}%"></div>` : ''}</div>
          </div>`;

        const formDots = form.split('').map((ch, idx) => {
          const recent = idx === form.length - 1 ? 'recent' : '';
          return `<span class="form-dot ${ch} ${recent}">${ch}</span>`;
        }).join('');

        return `
          <tr class="${zone}">
            <td class="pos">${rank}</td>
            <td><div class="team-cell"><img class="team-logo" src="${t.team.logo}" alt="" onerror="this.style.display='none'">${t.team.name}</div></td>
            <td class="c">${stats?.played ?? 0}</td>
            <td class="c">${stats?.win ?? 0}</td>
            <td class="c">${stats?.draw ?? 0}</td>
            <td class="c">${stats?.lose ?? 0}</td>
            <td class="c form-col"><div class="form-cell">${formDots || '—'}</div></td>
            <td class="c gd-col">
              <div class="gd-value ${gd > 0 ? 'pos' : (gd < 0 ? 'neg' : '')}">${gd > 0 ? '+' : ''}${gd}</div>
              ${gdBarHTML}
            </td>
            <td class="c pts">${view === 'overall' ? t.points : (stats?.win ?? 0) * 3 + (stats?.draw ?? 0)}</td>
          </tr>`;
      }).join('');

    async function loadScorers() {

    // Build normalised axis values for SVG radar chart
    function radarAxes(scorer, maxes) {
      const s = scorer.statistics?.[0] || {};
      return {
        goals:     (s.goals?.total ?? 0) / (maxes.goals || 1),
        assists:   (s.goals?.assists ?? 0) / (maxes.assists || 1),
        shots:     (s.shots?.total ?? 0) / (maxes.shots || 1),
        keyPasses: (s.passes?.key ?? 0) / (maxes.keyPasses || 1),
        minutes:   (s.games?.minutes ?? 0) / (maxes.minutes || 1),
        rating:    parseFloat(s.games?.rating ?? 0) / 10
      };
    }

    // Render SVG radar (6 axes)
    function radarSVG(axes, color = '#AAFF00') {
      const cx = 100, cy = 100, R = 72;
      const labels = ['GOA','AST','SHT','KP','MIN','RAT'];
      const values = [axes.goals, axes.assists, axes.shots, axes.keyPasses, axes.minutes, axes.rating];
      const n = 6;
      const points = values.map((v, i) => {
        const angle = (-Math.PI / 2) + (i * 2 * Math.PI / n);
        const r = R * Math.max(0.05, Math.min(1, v));
        return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
      });
      const polyStr = points.map(p => p.join(',')).join(' ');

      // grid rings
      let rings = '';
      for (let ring = 1; ring <= 4; ring++) {
        const rr = (R * ring) / 4;
        const ringPts = Array.from({ length: n }).map((_, i) => {
          const a = (-Math.PI / 2) + (i * 2 * Math.PI / n);
          return `${cx + rr * Math.cos(a)},${cy + rr * Math.sin(a)}`;
        }).join(' ');
        rings += `<polygon points="${ringPts}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
      }

      // spokes
      let spokes = '';
      for (let i = 0; i < n; i++) {
        const a = (-Math.PI / 2) + (i * 2 * Math.PI / n);
        const x2 = cx + R * Math.cos(a);
        const y2 = cy + R * Math.sin(a);
        spokes += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
      }

      // labels
      let labelSvg = '';
      labels.forEach((lb, i) => {
        const a = (-Math.PI / 2) + (i * 2 * Math.PI / n);
        const lx = cx + (R + 12) * Math.cos(a);
        const ly = cy + (R + 12) * Math.sin(a);
        labelSvg += `<text x="${lx}" y="${ly}" fill="#8B8B8B" font-size="9" font-weight="700" text-anchor="middle" dominant-baseline="central" letter-spacing="1">${lb}</text>`;
      });

      return `
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          ${rings}${spokes}
          <polygon points="${polyStr}" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="2" stroke-linejoin="round" style="filter: drop-shadow(0 0 6px ${color}66);"/>
          ${points.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`).join('')}
          ${labelSvg}
        </svg>`;
    }

    function renderFUTGrid(scorers) {
      const c = document.getElementById('scorersContent');
      // compute max values for normalisation
      const maxes = {
        goals:     Math.max(1, ...scorers.map(s => s.statistics?.[0]?.goals?.total ?? 0)),
        assists:   Math.max(1, ...scorers.map(s => s.statistics?.[0]?.goals?.assists ?? 0)),
        shots:     Math.max(1, ...scorers.map(s => s.statistics?.[0]?.shots?.total ?? 0)),
        keyPasses: Math.max(1, ...scorers.map(s => s.statistics?.[0]?.passes?.key ?? 0)),
        minutes:   Math.max(1, ...scorers.map(s => s.statistics?.[0]?.games?.minutes ?? 0))
      };

      c.innerHTML = `<div class="scorers-grid">${scorers.map((s, i) => {
        const rank = i + 1;
        const stat = s.statistics?.[0] || {};
        const goals = stat.goals?.total ?? 0;
        const assists = stat.goals?.assists ?? 0;
        const apps = stat.games?.appearences ?? 0;
        const minutes = stat.games?.minutes ?? 0;
        const mpg = goals > 0 ? Math.round(minutes / goals) : '—';
        const axes = radarAxes(s, maxes);
        const radarColor = rank === 1 ? '#F0A500' : '#AAFF00';
        const radar = radarSVG(axes, radarColor);

        // In-form badge if 2+ goals in limited games (good goals-per-app ratio) OR rank 1
        const inForm = apps > 0 && (goals / apps) >= 0.7;

        return `
          <div class="fut-card rank-${rank}" style="animation-delay: ${i * 60}ms">
            ${inForm ? '<span class="fut-badge">IN FORM</span>' : ''}
            <div class="fut-top">
              <div class="fut-rank">${rank}</div>
              <div>
                <div class="fut-player-name">${s.player.name}</div>
                <div class="fut-player-team">
                  <img src="${stat.team?.logo || ''}" alt="" onerror="this.style.display='none'">
                  ${stat.team?.name || ''}
                </div>
              </div>
            </div>
            <div class="fut-radar">${radar}</div>
            <div class="fut-stats-grid">
              <div class="fut-stat"><div class="fut-stat-value">${goals}</div><div class="fut-stat-label">Goals</div></div>
              <div class="fut-stat"><div class="fut-stat-value">${assists}</div><div class="fut-stat-label">Assists</div></div>
              <div class="fut-stat tooltip" data-tip="Minutes per goal"><div class="fut-stat-value">${mpg}</div><div class="fut-stat-label">MPG</div></div>
            </div>
          </div>
        `;
      }).join('')}</div>`;
    }

    function renderModalTab() {
      if (!modalFixtureData) return;
      const f = modalFixtureData;
      const status = f.fixture.status.short;
      const live = isLiveStatus(status);
      const statusText = live ? `LIVE ${f.fixture.status.elapsed || ''}'` : (isFinishedStatus(status) ? 'FULL TIME' : fmtTime(f.fixture.date));
      const header = `
        <div class="match-header">
          <div class="match-team"><img src="${f.teams.home.logo}" alt="" onerror="this.style.display='none'"><div class="name">${f.teams.home.name}</div></div>
          <div class="match-score-wrap">

            <div class="match-status ${live ? 'live' : ''}">${statusText}</div>
          </div>
          <div class="match-team"><img src="${f.teams.away.logo}" alt="" onerror="this.style.display='none'"><div class="name">${f.teams.away.name}</div></div>

    function eventIcon(type, detail) {
      if (type === 'Goal') return { icon: 'goal', cls: 'goal' };
      if (type === 'Card' && detail === 'Yellow Card') return { icon: 'square', cls: 'yellow' };
      if (type === 'Card' && (detail === 'Red Card' || detail === 'Second Yellow card')) return { icon: 'square', cls: 'red' };
      if (type === 'subst') return { icon: 'refresh-cw', cls: 'sub' };
      if (type === 'Var') return { icon: 'tv', cls: '' };
      return { icon: 'circle', cls: '' };
    }

    function renderEvents(f) {
      const events = f.events || [];
      if (!events.length) return '<div class="empty">No events yet.</div>';
      const homeId = f.teams.home.id;
      return events.map(e => {
        const isHome = e.team.id === homeId;
        const ico = eventIcon(e.type, e.detail);
        const info = `
          <div>
            <div class="event-player">${e.player?.name || ''}</div>
            <div class="event-detail">${e.detail || ''}${e.assist?.name ? ' · assist: ' + e.assist.name : ''}</div>
          </div>`;
        const time = `${e.time?.elapsed ?? ''}${e.time?.extra ? '+' + e.time.extra : ''}'`;
        return `
          <div class="event-row">
            <div class="event-time">${time}</div>
            <div class="event-home">${isHome ? info : ''}</div>
            <div class="event-center-icon ${ico.cls}"><i data-lucide="${ico.icon}"></i></div>
            <div class="event-away">${isHome ? '' : info}</div>

      }).join('');

    function renderLineups(f) {
      const lineups = f.lineups || [];
      if (!lineups.length) return '<div class="empty">Lineups not available yet.</div>';

      const home = lineups.find(l => l.team.id === f.teams.home.id) || lineups[0];
      const away = lineups.find(l => l.team.id === f.teams.away.id) || lineups[1];

      // Build SVG pitch with both teams
      const pitchW = 400, pitchH = 700;
      const pitchSvg = `
        <svg class="pitch-svg" viewBox="0 0 ${pitchW} ${pitchH}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="pitchGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0f5b2a"/>
              <stop offset="50%" stop-color="#0a4a22"/>
              <stop offset="100%" stop-color="#0f5b2a"/>
            </linearGradient>
            <pattern id="grass" width="40" height="40" patternUnits="userSpaceOnUse">
              <rect width="40" height="40" fill="url(#pitchGrad)"/>
              <rect width="40" height="20" fill="rgba(255,255,255,0.015)"/>
            </pattern>
          </defs>
          <rect width="${pitchW}" height="${pitchH}" fill="url(#grass)"/>
          <rect x="10" y="10" width="${pitchW-20}" height="${pitchH-20}" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <line x1="10" y1="${pitchH/2}" x2="${pitchW-10}" y2="${pitchH/2}" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <circle cx="${pitchW/2}" cy="${pitchH/2}" r="50" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <circle cx="${pitchW/2}" cy="${pitchH/2}" r="3" fill="rgba(255,255,255,0.5)"/>
          <rect x="${pitchW/2 - 70}" y="10" width="140" height="50" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <rect x="${pitchW/2 - 30}" y="10" width="60" height="20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <rect x="${pitchW/2 - 70}" y="${pitchH-60}" width="140" height="50" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          <rect x="${pitchW/2 - 30}" y="${pitchH-30}" width="60" height="20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          ${renderPitchPlayers(home?.startXI || [], 'home', pitchW, pitchH)}
          ${renderPitchPlayers(away?.startXI || [], 'away', pitchW, pitchH)}
        </svg>
      `;

      const subsHome = (home?.substitutes || []).map(s => `
        <div class="sub-row"><span class="sub-number">${s.player?.number ?? '—'}</span><span>${s.player?.name || ''}</span></div>`).join('');
      const subsAway = (away?.substitutes || []).map(s => `
        <div class="sub-row"><span class="sub-number">${s.player?.number ?? '—'}</span><span>${s.player?.name || ''}</span></div>`).join('');

      return `
        <div class="lineups-wrap">
          <div class="formations-row">
            <div class="formation-label home">
              <img class="team-logo" src="${f.teams.home.logo}" alt="" onerror="this.style.display='none'">
              <span>${f.teams.home.name}</span>
              <span class="formation-badge">${home?.formation || '—'}</span>
            </div>
            <div class="formation-label away">
              <span class="formation-badge">${away?.formation || '—'}</span>
              <span>${f.teams.away.name}</span>
              <img class="team-logo" src="${f.teams.away.logo}" alt="" onerror="this.style.display='none'">
            </div>

              </div>
              <div>
                <div class="subs-team-title away">${f.teams.away.name}</div>

              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderPitchPlayers(players, side, W, H) {
      // Home occupies bottom half (y: H/2..H), away occupies top half (y: 10..H/2)
      // Players have grid e.g. "4:3" meaning row 4, col 3 within team
      const yStart = side === 'home' ? H - 40 : 40;
      const yEnd = side === 'home' ? H / 2 + 30 : H / 2 - 30;
      const fill = side === 'home' ? '#AAFF00' : '#38BDF8';

      // Group players by row
      const rows = new Map();
      players.forEach(p => {
        const g = (p.player?.grid || '').split(':');
        const r = parseInt(g[0] || '1');
        if (!rows.has(r)) rows.set(r, []);
        rows.get(r).push(p);
      });
      const rowKeys = [...rows.keys()].sort((a, b) => a - b);
      const maxRow = Math.max(...rowKeys, 1);

      let out = '';
      rowKeys.forEach((rk) => {
        const rowPlayers = rows.get(rk);
        // Sort by col so positions are consistent
        rowPlayers.sort((a, b) => {
          const ca = parseInt((a.player?.grid || '0:0').split(':')[1] || '0');
          const cb = parseInt((b.player?.grid || '0:0').split(':')[1] || '0');
          return ca - cb;
        });
        const rowCount = rowPlayers.length;
        // y: row 1 = closest to own goal, higher row = pushing forward
        const rowProgress = (rk - 1) / Math.max(1, maxRow - 1);
        const y = yStart + (yEnd - yStart) * rowProgress;

        rowPlayers.forEach((p, idx) => {
          const x = W * (idx + 1) / (rowCount + 1);
          const name = (p.player?.name || '').split(' ').slice(-1)[0]; // surname
          out += `
            <g>
              <circle cx="${x}" cy="${y}" r="14" fill="${fill}" stroke="#000" stroke-width="2"/>
              <text class="player-number" x="${x}" y="${y}">${p.player?.number ?? ''}</text>
              <text class="player-name" x="${x}" y="${y + 26}">${name}</text>
            </g>`;
        });
      });
      return out;
    }

    function renderStats(f) {
      const stats = f.statistics || [];
      if (!stats.length || stats.length < 2) return '<div class="empty">Stats not available yet.</div>';
      const home = stats.find(s => s.team.id === f.teams.home.id) || stats[0];
      const away = stats.find(s => s.team.id === f.teams.away.id) || stats[1];

      // Map of stat type → display label + tooltip
      const STAT_MAP = {
        'Ball Possession': { label: 'Possession', tip: 'Percentage of time in possession' },
        'Total Shots':     { label: 'Total Shots', tip: 'All shots incl. blocked' },
        'Shots on Goal':   { label: 'On Target', tip: 'Shots that forced a save or goal' },
        'Shots off Goal':  { label: 'Off Target', tip: 'Shots missed wide or over' },
        'Blocked Shots':   { label: 'Blocked', tip: 'Shots blocked by defenders' },
        'Corner Kicks':    { label: 'Corners', tip: 'Corner kicks taken' },
        'Offsides':        { label: 'Offsides', tip: 'Offside calls' },
        'Fouls':           { label: 'Fouls', tip: 'Fouls committed' },
        'Yellow Cards':    { label: 'Yellow Cards', tip: 'Yellow cards shown' },
        'Red Cards':       { label: 'Red Cards', tip: 'Red cards shown' },
        'Goalkeeper Saves':{ label: 'Saves', tip: 'Saves made by keeper' },
        'Total passes':    { label: 'Passes', tip: 'Total passes attempted' },
        'Passes accurate': { label: 'Pass Accuracy', tip: 'Passes completed' },
        'Passes %':        { label: 'Pass %', tip: 'Pass completion rate' },
        'expected_goals':  { label: 'xG', tip: 'Expected Goals — chance quality' }
      };

      const parseVal = (v) => {
        if (v == null) return 0;
        if (typeof v === 'number') return v;
        const s = String(v).replace('%', '').trim();
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      };

      const out = home.statistics.map((h, i) => {
        const a = away.statistics[i];
        const map = STAT_MAP[h.type] || { label: h.type, tip: '' };
        const hv = parseVal(h.value);
        const av = parseVal(a?.value);
        const total = hv + av || 1;
        const hPct = (hv / total) * 100;
        const aPct = (av / total) * 100;
        const hDisplay = h.value != null ? String(h.value) : '0';
        const aDisplay = a?.value != null ? String(a.value) : '0';
        return `
          <div class="stat-row">
            <div class="stat-top">
              <div class="stat-value home">${hDisplay}</div>
              <div class="stat-label tooltip" ${map.tip ? `data-tip="${map.tip}"` : ''}>${map.label}</div>
              <div class="stat-value away">${aDisplay}</div>
            </div>
            <div class="stat-bar-wrap">
              <div class="stat-bar-home"><div class="stat-bar-home-fill" style="width: ${hPct}%"></div></div>
              <div class="stat-bar-center"></div>
              <div class="stat-bar-away"><div class="stat-bar-away-fill" style="width: ${aPct}%"></div></div>
            </div>
          </div>`;
      }).join('');
      return out || '<div class="empty">Stats not available yet.</div>';
    }

    // ESC to close modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('matchModal').classList.contains('active')) closeModal();
    });

    /* ============ INIT ============ */
    refreshIcons();
    loadHome();
  </script>
</body>
</html>
